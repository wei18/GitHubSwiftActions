name: Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:

  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest
        swift: [6]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          mise_toml: |
            [tools]
            swift = "${{ matrix.swift }}"
            [settings]
            experimental = true
      - env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          swift build
          swift test