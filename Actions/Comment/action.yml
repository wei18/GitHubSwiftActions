description: Runs the process of adding or updating a comment in a GitHub issue or pull request.
inputs:
  action_ref:
    default: ${{ github.action_ref }}
  anchor:
    description: The anchor for the command.
    required: true
  body:
    description: The body for the command.
    required: true
  number:
    description: The number for the command.
    required: true
  owner:
    description: The owner for the command.
    required: true
  repo:
    description: The repo for the command.
    required: true
  token:
    description: The token for the command.
    required: true
name: Comment
runs:
  steps:
  - name: Setup Mise
    uses: jdx/mise-action@v2
  - env:
      ACTION_REF: ${{ inputs.action_ref }}
      ANCHOR: ${{ inputs.anchor }}
      BODY: ${{ inputs.body }}
      GITHUB_TOKEN: ${{ inputs.token }}
      MISE_EXPERIMENTAL: '1'
      NUMBER: ${{ inputs.number }}
      OWNER: ${{ inputs.owner }}
      REPO: ${{ inputs.repo }}
      TOKEN: ${{ inputs.token }}
    name: Run Comment
    run: mise x "spm:Wei18/GitHubSwiftActions@${{ inputs.action_ref }}" -- Comment
    shell: bash
  using: composite
