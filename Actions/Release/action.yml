description: Runs the process of creating GitHub Release with bump type and git ref
inputs:
  action_ref:
    default: ${{ github.action_ref }}
  owner:
    description: The owner for the command.
    required: true
  ref:
    description: The ref for the command.
    required: true
  repo:
    description: The repo for the command.
    required: true
  token:
    description: The token for the command.
    required: true
  type:
    description: The type for the command.
    required: true
name: Release
runs:
  steps:
  - name: Setup Mise
    uses: jdx/mise-action@v2
  - env:
      ACTION_REF: ${{ inputs.action_ref }}
      GITHUB_TOKEN: ${{ inputs.token }}
      MISE_EXPERIMENTAL: '1'
      OWNER: ${{ inputs.owner }}
      REF: ${{ inputs.ref }}
      REPO: ${{ inputs.repo }}
      TOKEN: ${{ inputs.token }}
      TYPE: ${{ inputs.type }}
    name: Run Release
    run: mise x "spm:Wei18/GitHubSwiftActions@${{ inputs.action_ref }}" -- Release
    shell: bash
  using: composite
